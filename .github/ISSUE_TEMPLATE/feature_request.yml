name: Feature request
description: Propose a focused improvement or new capability
title: "feat: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem or workflow pain point does this solve?
      placeholder: Describe the current limitation.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the feature or change you want.
      placeholder: What should the project do differently?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What other approaches did you consider?
    validations:
      required: false

  - type: textarea
    id: workflow
    attributes:
      label: Agent or developer workflow context
      description: Explain how this affects AI agents, code intelligence, context engineering, or developer workflows.
    validations:
      required: false

  - type: textarea
    id: risks
    attributes:
      label: Compatibility, security, or privacy concerns
      description: Note any risks, breaking changes, or sensitive-data concerns.
    validations:
      required: false
